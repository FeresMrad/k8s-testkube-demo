<div class="container">
  <h2>Product Report</h2>
  <p class="subtitle">
    Download a full PDF report of all products currently in the catalog.
  </p>

  <div class="action-area">
    @if (downloading) {
      <mat-spinner diameter="48" />
      <p>Generating report...</p>
    } @else {
      <button
        mat-raised-button
        color="primary"
        (click)="downloadReport()"
        id="download-report-btn">
        <mat-icon>download</mat-icon>
        Download PDF Report
      </button>
    }
  </div>
</div>
