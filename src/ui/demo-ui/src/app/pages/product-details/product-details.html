<div class="container">
  <button mat-button routerLink="/products">
    <mat-icon>arrow_back</mat-icon> Back to Products
  </button>

  @if (notFound()) {
    <p>Product not found.</p>
  } @else if (product()) {
    <mat-card class="detail-card">
      <mat-card-header>
        <mat-card-title>{{ product()!.name }}</mat-card-title>
        <mat-card-subtitle>{{ product()!.category }}</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <p class="description">{{ product()!.description }}</p>

        <div class="meta">
          <span><strong>Author:</strong> {{ product()!.author }}</span>
          <span><strong>Published:</strong> {{ product()!.publishedAt | date:'longDate' }}</span>
        </div>

        <div class="tags">
          <strong>Tags:</strong>
          @for (tag of product()!.tags; track tag) {
            <mat-chip>{{ tag }}</mat-chip>
          }
        </div>
      </mat-card-content>
    </mat-card>
  }
</div>
