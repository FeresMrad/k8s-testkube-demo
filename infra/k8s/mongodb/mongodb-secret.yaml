apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: demo
type: Opaque
data:
  # base64 encoded values — dev only, not real credentials
  # echo -n "admin" | base64        → YWRtaW4=
  # echo -n "devpassword" | base64  → ZGV2cGFzc3dvcmQ=
  mongodb-root-username: YWRtaW4=
  mongodb-root-password: ZGV2cGFzc3dvcmQ=