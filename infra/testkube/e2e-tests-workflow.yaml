apiVersion: testworkflows.testkube.io/v1
kind: TestWorkflow
metadata:
  name: e2e-tests
  namespace: testkube
  labels:
    app: demo
    type: e2e
spec:
  content:
    git:
      uri: https://github.com/FeresMrad/k8s-testkube-demo.git
      revision: master
      paths:
        - tests/e2e

  pod:
    hostAliases:
      - ip: "10.96.189.46"
        hostnames:
          - "demo.local"

  container:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    workingDir: /data/repo/tests/e2e/DemoApp.E2E
    env:
      - name: PLAYWRIGHT_BROWSERS_PATH
        value: /data/pw-browsers

  steps:
    - name: Install system dependencies
      shell: |
        apt-get update -qq
        apt-get install -y --no-install-recommends \
          libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
          libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
          libgbm1 libxkbcommon0 libpango-1.0-0 libcairo2 \
          libasound2t64 libwayland-client0

    - name: Restore and build
      shell: |
        dotnet restore
        dotnet build -c Debug

    - name: Install Playwright browsers and run tests
      shell: |
        pwsh bin/Debug/net10.0/playwright.ps1 install chromium --with-deps
        dotnet test --verbosity normal --logger "trx;LogFileName=results.trx" --results-directory /data/repo/tests/e2e/DemoApp.E2E/TestResults

    - name: Save test results
      artifacts:
        paths:
          - /data/repo/tests/e2e/DemoApp.E2E/TestResults/**/*.trx
          - /data/repo/tests/e2e/DemoApp.E2E/TestResults/videos/**/*.webm